<!--
  ArinSoul Conversational Voice Widget
  One tap to start → auto-detects silence → replies → auto-listens again
  Tap again to end the conversation.
-->

<style>
  #as-widget {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  #as-bubble {
    background: #ffffff;
    border-radius: 18px 18px 4px 18px;
    padding: 14px 18px;
    box-shadow: 0 8px 32px rgba(107, 70, 193, 0.18);
    max-width: 270px;
    font-size: 14px;
    line-height: 1.6;
    color: #2d2d2d;
    display: none;
    border: 1px solid #ede9fe;
  }

  #as-bot-text  { margin-bottom: 6px; }
  #as-user-text { font-size: 11px; color: #9ca3af; margin-top: 6px; font-style: italic; }
  #as-status    { font-size: 11px; color: #7c3aed; font-weight: 600; margin-top: 4px; min-height: 14px; }

  #as-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(124, 58, 237, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    outline: none;
    transition: transform 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  #as-btn:hover { transform: scale(1.08); }

  /* Listening = red pulse */
  #as-btn.as-listening {
    background: linear-gradient(135deg, #dc2626, #f87171);
    box-shadow: 0 6px 24px rgba(220, 38, 38, 0.45);
    animation: as-pulse 1.1s infinite;
  }

  /* Processing = amber */
  #as-btn.as-processing {
    background: linear-gradient(135deg, #d97706, #fbbf24);
    box-shadow: 0 6px 24px rgba(217, 119, 6, 0.45);
  }

  /* Speaking = green pulse */
  #as-btn.as-speaking {
    background: linear-gradient(135deg, #059669, #34d399);
    box-shadow: 0 6px 24px rgba(5, 150, 105, 0.45);
    animation: as-pulse 1.5s infinite;
  }

  #as-label {
    font-size: 11px;
    color: #6b7280;
    text-align: center;
    margin-top: 2px;
  }

  @keyframes as-pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.12); }
  }
</style>

<div id="as-widget">
  <div id="as-bubble">
    <div id="as-bot-text">Namaste! 🙏 Anxiety, stress ya overthinking ke baare mein poochna hai? Tap karein aur boliye!</div>
    <div id="as-user-text"></div>
    <div id="as-status"></div>
  </div>
  <button id="as-btn" title="ArinSoul Voice Support">🎙️</button>
  <div id="as-label">Tap to talk</div>
</div>

<script>
(function () {
  'use strict';

  var BACKEND = 'https://arinsoul-voice-agent-production.up.railway.app';

  var btn     = document.getElementById('as-btn');
  var bubble  = document.getElementById('as-bubble');
  var botText = document.getElementById('as-bot-text');
  var userTxt = document.getElementById('as-user-text');
  var status  = document.getElementById('as-status');
  var label   = document.getElementById('as-label');

  if (!btn) return;

  /* ── State ─────────────────────────────────────── */
  var inConversation = false;  // true = conversation mode is ON
  var busy           = false;  // true = processing or speaking (don't restart yet)
  var recorder       = null;
  var chunks         = [];
  var audioCtx       = null;
  var speechDetected = false;

  /* ── Greeting after 1.5 s ──────────────────────── */
  setTimeout(function () { bubble.style.display = 'block'; }, 1500);

  /* ── Single button: start OR stop conversation ─── */
  btn.addEventListener('click', function () {
    if (!inConversation) {
      startConversation();
    } else {
      endConversation();
    }
  });

  /* ═══════════════════════════════════════════════
     START CONVERSATION
  ═══════════════════════════════════════════════ */
  function startConversation() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showMsg('⚠️ Aapka browser voice support nahi karta. Chrome use karein.');
      return;
    }
    inConversation = true;
    busy           = false;
    label.textContent = 'Tap to end';
    bubble.style.display = 'block';
    listen();
  }

  /* ═══════════════════════════════════════════════
     END CONVERSATION
  ═══════════════════════════════════════════════ */
  function endConversation() {
    inConversation = false;
    busy           = false;
    label.textContent = 'Tap to talk';
    stopMic();
    setBtn('idle');
    status.textContent = 'Conversation ended. Tap to start again.';
  }

  /* ═══════════════════════════════════════════════
     LISTEN — open mic, auto-stop on silence
  ═══════════════════════════════════════════════ */
  function listen() {
    if (!inConversation || busy) return;

    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function (stream) {
      var types = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
      var mime  = '';
      for (var i = 0; i < types.length; i++) {
        if (MediaRecorder.isTypeSupported(types[i])) { mime = types[i]; break; }
      }

      chunks         = [];
      speechDetected = false;

      try   { recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {}); }
      catch (e) { recorder = new MediaRecorder(stream); }

      recorder.ondataavailable = function (e) {
        if (e.data && e.data.size > 0) chunks.push(e.data);
      };
      recorder.onstop = onRecordingDone;
      recorder.start(100);

      setBtn('listening');
      botText.textContent = 'Sun raha hoon... 👂';
      userTxt.textContent = '';
      status.textContent  = 'Boliye...';

      watchSilence(stream);
    })
    .catch(function (err) {
      inConversation = false;
      label.textContent = 'Tap to talk';
      setBtn('idle');
      var msg = '⚠️ Microphone access chahiye.';
      if (err.name === 'NotAllowedError') msg = '🎤 Microphone permission deny hui. Browser settings mein allow karein.';
      showMsg(msg);
    });
  }

  /* ═══════════════════════════════════════════════
     SILENCE DETECTION via Web Audio API
  ═══════════════════════════════════════════════ */
  function watchSilence(stream) {
    try {
      audioCtx        = new (window.AudioContext || window.webkitAudioContext)();
      var src         = audioCtx.createMediaStreamSource(stream);
      var analyser    = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      src.connect(analyser);

      var buf          = new Uint8Array(analyser.fftSize);
      var silenceStart = null;
      var startedAt    = Date.now();
      var THRESHOLD    = 8;    // RMS below this = silence
      var SILENCE_MS   = 1800; // ms of quiet after speech → stop
      var MAX_MS       = 15000;// hard limit

      function tick() {
        if (!recorder || recorder.state === 'inactive') return;

        analyser.getByteTimeDomainData(buf);
        var rms = 0;
        for (var i = 0; i < buf.length; i++) {
          var v = (buf[i] - 128) / 128;
          rms += v * v;
        }
        rms = Math.sqrt(rms / buf.length) * 100;

        if (Date.now() - startedAt > MAX_MS) { stopMic(); return; }

        if (rms > THRESHOLD) {
          speechDetected = true;
          silenceStart   = null;
          status.textContent = 'Sun raha hoon... 🎤';
        } else if (speechDetected) {
          if (!silenceStart) silenceStart = Date.now();
          else if (Date.now() - silenceStart > SILENCE_MS) { stopMic(); return; }
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

    } catch (e) {
      // Fallback: stop after 6 seconds if Web Audio unavailable
      setTimeout(stopMic, 6000);
    }
  }

  /* ═══════════════════════════════════════════════
     STOP MIC
  ═══════════════════════════════════════════════ */
  function stopMic() {
    if (audioCtx) { try { audioCtx.close(); } catch (e) {} audioCtx = null; }
    if (recorder && recorder.state !== 'inactive') {
      recorder.stop();
      if (recorder.stream) recorder.stream.getTracks().forEach(function (t) { t.stop(); });
    }
  }

  /* ═══════════════════════════════════════════════
     AFTER RECORDING STOPS → process or restart
  ═══════════════════════════════════════════════ */
  function onRecordingDone() {
    if (!speechDetected || chunks.length === 0) {
      // Nothing was said — go back to listening
      if (inConversation) setTimeout(listen, 400);
      return;
    }

    busy = true;
    setBtn('processing');
    status.textContent  = 'Samajh raha hoon...';
    botText.textContent = 'Jawab dhoondh raha hoon... 🤔';

    var mimeType = (recorder && recorder.mimeType) ? recorder.mimeType : 'audio/webm';
    var blob     = new Blob(chunks, { type: mimeType });

    var reader = new FileReader();
    reader.onload = function () {
      var base64 = reader.result.split(',')[1];

      fetch(BACKEND + '/chat', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ audio: base64 })
      })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        botText.textContent = data.botText || data.error || 'Dobara bolein.';
        userTxt.textContent = data.userText ? 'You: "' + data.userText + '"' : '';

        if (data.audio) {
          speakThen(data.audio, function () {
            busy = false;
            if (inConversation) setTimeout(listen, 600);
          });
        } else {
          busy = false;
          if (inConversation) setTimeout(listen, 1200);
        }
      })
      .catch(function (e) {
        botText.textContent = '❌ Network error. Internet check karein!';
        status.textContent  = e.message || '';
        busy = false;
        if (inConversation) setTimeout(listen, 2000);
      });
    };
    reader.readAsDataURL(blob);
  }

  /* ═══════════════════════════════════════════════
     PLAY TTS AUDIO, then fire callback
  ═══════════════════════════════════════════════ */
  function speakThen(base64Audio, callback) {
    setBtn('speaking');
    status.textContent = 'Priya bol rahi hai... 🔊';

    try {
      var audio  = new Audio('data:audio/wav;base64,' + base64Audio);
      var done   = false;
      function finish() { if (!done) { done = true; callback(); } }
      audio.onended = finish;
      audio.onerror = finish;

      var p = audio.play();
      if (p !== undefined) p.catch(finish);
    } catch (e) { callback(); }
  }

  /* ── UI helpers ─────────────────────────────────── */
  var ICONS = { idle: '🎙️', listening: '🔴', processing: '⏳', speaking: '🔊' };
  function setBtn(state) {
    btn.className   = state === 'idle' ? '' : 'as-' + state;
    btn.textContent = ICONS[state] || '🎙️';
  }

  function showMsg(msg) {
    bubble.style.display = 'block';
    botText.textContent  = msg;
    userTxt.textContent  = '';
    status.textContent   = '';
  }

})();
</script>
